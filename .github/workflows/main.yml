name: BrowserStack Playwright Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  browserstack-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Show package scripts
        run: cat package.json

      - name: Start Web App
        run: |
          npx expo start --web --non-interactive --port 8081 > app.log 2>&1 &
          sleep 20
          cat app.log
          npx wait-on http://127.0.0.1:8081 --timeout 180000

      - name: Setup BrowserStack environment
        uses: browserstack/github-actions/setup-env@master
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Start BrowserStack Local
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start

      - name: Run Playwright test on BrowserStack
        run: npx playwright test tests/browserstack.spec.js

      - name: Print app log on failure
        if: failure()
        run: cat app.log

      - name: Stop BrowserStack Local
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop
